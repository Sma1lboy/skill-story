<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="400" viewBox="0 0 1600 400">
  <!-- skill-story banner — kobe / codefox-repo brand language -->
  <rect width="1600" height="400" fill="#141413"/>
  <rect x="0" y="396" width="1600" height="4" fill="#DE5F38"/>
  <!-- badge: viewfinder frame + prompt-play + recording dot -->
  <g transform="translate(84,80) scale(0.469)">
    <rect x="16" y="16" width="480" height="480" rx="112" fill="#1A1815"/>
    <rect x="16" y="16" width="480" height="480" rx="112" fill="none" stroke="#2B2620" stroke-width="6"/>
    <g fill="#DE5F38">
      <!-- viewfinder corners -->
      <rect x="104" y="120" width="28" height="96" rx="6"/>
      <rect x="104" y="120" width="96" height="28" rx="6"/>
      <rect x="380" y="120" width="28" height="96" rx="6"/>
      <rect x="312" y="120" width="96" height="28" rx="6"/>
      <rect x="104" y="296" width="28" height="96" rx="6"/>
      <rect x="104" y="364" width="96" height="28" rx="6"/>
      <rect x="380" y="296" width="28" height="96" rx="6"/>
      <rect x="312" y="364" width="96" height="28" rx="6"/>
    </g>
    <!-- prompt-play glyph -->
    <path d="M196 196 L332 256 L196 316 L196 276 L268 256 L196 236 Z" fill="#F2EDE3"/>
    <!-- recording dot -->
    <circle cx="384" cy="256" r="22" fill="#7EC13F"/>
  </g>
  <!-- wordmark -->
  <text x="380" y="212" font-family="JetBrainsMonoNL Nerd Font, JetBrains Mono, Menlo, monospace" font-weight="800" font-size="92" letter-spacing="-3">
    <tspan fill="#F2EDE3">skill</tspan><tspan fill="#DE5F38"> story</tspan>
  </text>
  <!-- cursor block -->
  <rect x="964" y="136" width="30" height="86" fill="#7EC13F"/>
  <!-- tagline -->
  <text x="384" y="272" font-family="JetBrainsMonoNL Nerd Font, JetBrains Mono, Menlo, monospace" font-size="27" fill="#9A9285">script → record → verify → render · interaction flows, tested like code</text>
</svg>
